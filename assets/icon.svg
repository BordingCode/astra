<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#1a2350"/>
      <stop offset="55%" stop-color="#0a0f24"/>
      <stop offset="100%" stop-color="#05060e"/>
    </radialGradient>
    <radialGradient id="mote" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="35%" stop-color="#aef0ff"/>
      <stop offset="100%" stop-color="#3aa0ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="trail" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#3aa0ff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#aef0ff" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- parabolic motion arc -->
  <path d="M96 392 Q 256 96 416 392" fill="none" stroke="url(#trail)" stroke-width="20" stroke-linecap="round"/>
  <!-- stroboscopic dots: spacing widens (acceleration) -->
  <circle cx="120" cy="356" r="7" fill="#aef0ff" opacity="0.45"/>
  <circle cx="150" cy="300" r="8" fill="#aef0ff" opacity="0.55"/>
  <circle cx="192" cy="236" r="9" fill="#aef0ff" opacity="0.7"/>
  <circle cx="256" cy="150" r="10" fill="#cfeaff" opacity="0.85"/>
  <!-- the bright mote at the apex of the throw -->
  <circle cx="256" cy="150" r="74" fill="url(#mote)"/>
  <circle cx="256" cy="150" r="26" fill="#ffffff"/>
</svg>
